version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password
      MYSQL_DATABASE: helpdesk_db          # 👈 ให้ตรงกับ backend
      MYSQL_USER: helpdesk_user            # 👈 ให้ตรงกับ backend
      MYSQL_PASSWORD: your_strong_user_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - helpdesk-net
    ports:
      - "3306:3306"      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      # === Frontend URL ===
      - FRONTEND_URL=http://localhost:8080

      # === Google OAuth ===
      - GOOGLE_CLIENT_ID=587858471059-3higpfbv1pnrdiok0ds0v0459n30btei.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - GOOGLE_CALLBACK_URL=http://localhost:3000/auth/google/redirect

      - NODE_ENV=production
      - COOKIE_SECURE=false
      - JWT_SECRET=CCISRUCOM
      - JWT_EXPIRES_IN=7d

      # === Use REAL Database ===
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_USER=helpdesk_user
      - DATABASE_PASSWORD=your_strong_user_password
      - DATABASE_NAME=helpdesk_db

      # === SMTP Email ===
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=465
      - SMTP_USER=beermini991@gmail.com
      - SMTP_PASS=djasuhdowsxcoevb
      - SMTP_FROM=beermini991@gmail.com

      # === Telegram ===
      - TELEGRAM_BOT_TOKEN=8350312225:AAEaJ0eZeJ1Oxy7EubTON27ZIPodRxTzCnA
      - TELEGRAM_CHAT_ID=-4828646624

    restart: unless-stopped
    command: >
      sh -c "
        node dist/seeds/seed-roles.js &&
        node dist/main.js
      "
    networks:                # 👈 เพิ่มตรงนี้
      - helpdesk-net    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helpdesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"     # <— host:container (NO conflict with Apache)
    networks:
      - helpdesk-net

networks:
  helpdesk-net:

volumes:
  db_data: