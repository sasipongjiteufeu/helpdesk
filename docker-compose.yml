version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_ENV} # 👈 ใช้จาก .env
      MYSQL_DATABASE: helpdesk_db          # 👈 ให้ตรงกับ backend
      MYSQL_USER: helpdesk_user            # 👈 ให้ตรงกับ backend
      MYSQL_PASSWORD: ${MYSQL_PASSWORD_ENV} # 👈 ใช้จาก .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - helpdesk-net
    ports:
      - "3306:3306"      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helpdesk-backend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      # === Frontend URL ===
      - FRONTEND_URL=http://localhost:8080

      # === Google OAuth ===
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID_ENV} # 👈 ใช้จาก .env
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET_ENV} # 👈 ใช้จาก .env
      - GOOGLE_CALLBACK_URL=http://localhost:3000/auth/google/redirect

      - NODE_ENV=production
      - COOKIE_SECURE=false
      - JWT_SECRET=${JWT_SECRET_ENV} # 👈 ใช้จาก .env
      - JWT_EXPIRES_IN=7d

      # === Use REAL Database ===
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_USER=helpdesk_user
      - DATABASE_PASSWORD=your_strong_user_password
      - DATABASE_NAME=helpdesk_db

      # === SMTP Email ===
      - SMTP_HOST=${SMTP_HOST_ENV} # 👈 ใช้จาก .env
      - SMTP_PORT=${SMTP_PORT_ENV} # 👈 ใช้จาก .env
      - SMTP_USER=${SMTP_USER_ENV} # 👈 ใช้จาก .env
      - SMTP_PASS=${SMTP_PASS_ENV}
      - SMTP_FROM=${SMTP_FROM_ENV}

      # === Telegram ===
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_ENV} # 👈 ใช้จาก .env
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID_ENV} # 👈 ใช้จาก .env

    restart: unless-stopped
    command: >
      sh -c "
        node dist/seeds/seed-roles.js &&
        node dist/main.js
      "
    networks:               
      - helpdesk-net    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helpdesk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"     # <— host:container (NO conflict with Apache)
    networks:
      - helpdesk-net

networks:
  helpdesk-net:

volumes:
  db_data: